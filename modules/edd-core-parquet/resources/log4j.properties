# Suppress noisy Hadoop logging during tests
log4j.rootLogger=WARN, console

log4j.appender.console=org.apache.log4j.ConsoleAppender
log4j.appender.console.layout=org.apache.log4j.PatternLayout
log4j.appender.console.layout.ConversionPattern=%d{HH:mm:ss} %-5p %c{1} - %m%n

# Suppress "Got brand-new compressor" from Hadoop CodecPool
log4j.logger.org.apache.hadoop.io.compress.CodecPool=ERROR

# Suppress "Unable to load native-hadoop library" warning
log4j.logger.org.apache.hadoop.util.NativeCodeLoader=ERROR
